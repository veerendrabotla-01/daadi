name: Build and Sign Android App Bundle (AAB)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Production AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Set up Environment Variables (.env)
        run: |
          # Create .env file from GitHub Secrets (falls back to placeholder values if empty)
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'MY_GEMINI_API_KEY' }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'SUPABASE_URL_PLACEHOLDER' }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'SUPABASE_ANON_KEY_PLACEHOLDER' }}" >> .env
          echo "PIESOCKET_API_KEY=${{ secrets.PIESOCKET_API_KEY || 'PIESOCKET_API_KEY_PLACEHOLDER' }}" >> .env
          echo "PIESOCKET_CLUSTER_ID=${{ secrets.PIESOCKET_CLUSTER_ID || 'free.blr2' }}" >> .env
          echo "PIESOCKET_API_SECRET=${{ secrets.PIESOCKET_API_SECRET || 'PIESOCKET_API_SECRET_PLACEHOLDER' }}" >> .env
          echo "MULTIPLAYER_SIGNATURE_SECRET=${{ secrets.MULTIPLAYER_SIGNATURE_SECRET || 'DaadiAntiCheatSecretPhraseKey' }}" >> .env
          echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID || 'ca-app-pub-3940256099942544~3347511713' }}" >> .env
          echo "ADMOB_INTERSTITIAL_UNIT_ID=${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID || 'ca-app-pub-3940256099942544/1033173712' }}" >> .env
          echo "ADMOB_REWARDED_UNIT_ID=${{ secrets.ADMOB_REWARDED_UNIT_ID || 'ca-app-pub-3940256099942544/5224354917' }}" >> .env

      - name: Set up Signing Credentials
        id: signing
        run: |
          if [ -z "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "⚠️ No release keystore secret found. Generating a temporary self-signed keystore for this build..."
            keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass tempstorepass -keypass tempkeypass -dname "CN=Daadi, O=VeeruStudio, C=IN"
            echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> $GITHUB_ENV
            echo "STORE_PASSWORD=tempstorepass" >> $GITHUB_ENV
            echo "KEY_PASSWORD=tempkeypass" >> $GITHUB_ENV
          else
            echo "✅ Decoding production release keystore..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
            echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> $GITHUB_ENV
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Android App Bundle (AAB)
        run: ./gradlew :app:bundleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Upload Build Artifacts (.aab)
        uses: actions/artifacts-upload@v1 # Keep your bundle preserved in GitHub run artifacts
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/*.aab
